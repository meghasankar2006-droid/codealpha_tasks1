*SIGN UP/LOGIN IN FORM:*

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login & Signup</title>
<style>
    body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    gap : 20px;
    justify-content: center;
    align-items: center;
    height: 100vh;
    }
    .container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 300px;
    }
    h2 {
    text-align: center;
    margin-bottom: 20px;
    }
    input[type="text"], input[type="password"] {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    }
    button {
    width: 100%;
    padding: 10px;
    background-color: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    }
    button:hover {
    background-color: #45a049;
    }
    .toggle-link {
    text-align: center;
    margin-top: 15px;
    cursor: pointer;
    color: blue;
    text-decoration: underline;
    }
    .message {
    text-align: center;
    margin-top: 10px;
    color: red;
    }
    </style>
</head>
<body>

    <div class="container">
    <h2 id="formTitle">Sign Up</h2>

    <form id="userForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" id="submitBtn">Sign Up</button>
    </form>

    <div class="toggle-link" id="toggleForm">Already have an account? Login</div>
    <div class="message" id="message"></div>
    </div>

<script>
    const form = document.getElementById("userForm");
    const toggleLink = document.getElementById("toggleForm");
    const title = document.getElementById("formTitle");
    const btn = document.getElementById("submitBtn");
    const message = document.getElementById("message");

    let isLoginMode = false;

    toggleLink.addEventListener("click", () => {
    isLoginMode = !isLoginMode;
    title.textContent = isLoginMode ? "Login" : "Sign Up";
    btn.textContent = isLoginMode ? "Login" : "Sign Up";
    toggleLink.textContent = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Login";
    message.textContent = "";
    });

    form.addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (isLoginMode) {
    // Login Logic
    const storedUser = JSON.parse(localStorage.getItem(username));

    if (storedUser && storedUser.password === password) {
    message.style.color = "green";
    message.textContent = "Login successful!";
    } else {
    message.style.color = "red";
    message.textContent = "Invalid username or password.";
    }

    } else {
    // Sign Up Logic
    if (localStorage.getItem(username)) {
    message.style.color = "red";
    message.textContent = "Username already exists.";
    } else {
    localStorage.setItem(username, JSON.stringify({ username, password }));
    message.style.color = "green";
    message.textContent = "Sign up successful! You can now login.";
    }
    }

    form.reset();
    });
</script>

</body>
</html>
